<!DOCTYPE HTML>
<html>
<head>
<meta name="viewport" content="width=device-width initial-scale=1.0 maximum-scale=1.0 user-scalable=0">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>宽厚里管线叠加图</title>
<style>
body,html{
  margin:0;
  padding:0;
  font:12px/16px Verdana,Helvetica,Arial,sans-serif;
  width:100%;
  height:100%;
}
.container{
  height:100%;
}
.panel{
  position:fixed;
  left:12px;
  top:12px;
  z-index:40;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  padding:10px;
  max-width:min(760px, calc(100vw - 24px));
  background:rgba(12, 21, 29, 0.9);
  border:1px solid rgba(255, 255, 255, 0.18);
  border-radius:8px;
  box-shadow:0 10px 28px rgba(0, 0, 0, 0.26);
  backdrop-filter:blur(8px);
}
.panel button,
.panel select{
  height:34px;
  padding:0 12px;
  border:1px solid rgba(255, 255, 255, 0.18);
  border-radius:4px;
  background:#ffffff;
  color:#16212a;
  font-size:13px;
}
.panel button{
  cursor:pointer;
}
.panel button:disabled{
  cursor:not-allowed;
  opacity:0.45;
}
.panel .hint{
  color:rgba(255,255,255,0.82);
  font-size:12px;
}
.badge{
  display:inline-flex;
  align-items:center;
  height:24px;
  padding:0 10px;
  border-radius:999px;
  background:rgba(32, 246, 255, 0.14);
  color:#baf9ff;
  font-size:12px;
  border:1px solid rgba(32, 246, 255, 0.25);
}
.status-bar{
  position:fixed;
  left:12px;
  bottom:12px;
  z-index:40;
  max-width:min(560px, calc(100vw - 24px));
  padding:8px 10px;
  color:#fff;
  background:rgba(12, 21, 29, 0.9);
  border:1px solid rgba(255, 255, 255, 0.18);
  border-radius:6px;
  box-shadow:0 8px 22px rgba(0, 0, 0, 0.2);
  backdrop-filter:blur(8px);
}
.selection-overlay{
  position:fixed;
  inset:0;
  z-index:30;
  pointer-events:none;
}
.selection-overlay.active{
  cursor:crosshair;
  pointer-events:auto;
}
.selection-rect{
  position:absolute;
  box-sizing:border-box;
  border:2px solid #22c55e;
  background:rgba(34, 197, 94, 0.14);
  box-shadow:0 0 0 9999px rgba(0, 0, 0, 0.18);
}
.capture-hidden{
  visibility:hidden !important;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/proj4@2.9.2/dist/proj4.js"></script>
<script src="https://webapi.amap.com/maps?v=2.0&key=86b38afc099831c3350c486dd1ff1c98&plugin=AMap.ControlBar,AMap.ToolBar"></script>
</head>
<body>
<div id="container" style="width:100%; height:100%;resize:both;"></div>
<div class="panel">
  <button id="loadDxfBtn" type="button">重新加载 DXF</button>
  <button id="pickDxfBtn" type="button">选择本地 DXF</button>
  <input id="dxfFileInput" type="file" accept=".dxf" style="display:none;">
  <select id="crsSelect">
    <option value="cgcs2000-gk-117">CGCS2000 3° GK 117E</option>
    <option value="cgcs2000-gk-114">CGCS2000 3° GK 114E</option>
    <option value="cgcs2000-gk-120">CGCS2000 3° GK 120E</option>
    <option value="cgcs2000-utm-50n">CGCS2000 UTM 50N</option>
  </select>
  <button id="fitPipelineBtn" type="button" disabled>定位到管线</button>
  <button id="selectAreaBtn" type="button">框选区域</button>
  <button id="exportAreaBtn" type="button" disabled>导出</button>
  <button id="clearAreaBtn" type="button" disabled>清除</button>
  <span id="pipelineStats" class="badge">待加载</span>
  <span class="hint">默认按文件自带坐标加载；若位置不对，切换坐标系后重载。</span>
</div>
<div id="selectionOverlay" class="selection-overlay"></div>
<div id="statusBar" class="status-bar">初始化中</div>
<script>
var DXF_FILE_NAME = '宽厚里.dxf';
var WGS84 = 'WGS84';
var VIEW_PRESET = {
  pitch: 58,
  rotation: -18
};
var BUILDING_STYLE = {
  wallColor: 'rgba(220,228,236,0.50)',
  roofColor: 'rgba(244,248,252,0.72)'
};
var PIPELINE_STYLE = {
  baseColor: '#3b1200',
  baseOpacity: 0.48,
  baseWeight: 6,
  strokeColor: '#ff6a00',
  strokeOpacity: 0.98,
  strokeWeight: 3,
  lineJoin: 'miter',
  lineCap: 'butt',
  zIndexBase: 120,
  zIndexTop: 126
};
var VALVE_STYLE = {
  symbolColor: '#ff6a00',
  borderColor: '#3b1200',
  textColor: '#ffb366',
  haloColor: 'rgba(18, 8, 0, 0.84)',
  zIndex: 140
};
var VALVE_KEYWORDS = ['阀'];
var SEGMENT_MERGE_TOLERANCE = 0.8;
var CRS_DEFS = {
  'cgcs2000-gk-117': {
    label: 'CGCS2000 3-degree GK CM 117E',
    definition: '+proj=tmerc +lat_0=0 +lon_0=117 +k=1 +x_0=500000 +y_0=0 +ellps=GRS80 +units=m +no_defs'
  },
  'cgcs2000-gk-114': {
    label: 'CGCS2000 3-degree GK CM 114E',
    definition: '+proj=tmerc +lat_0=0 +lon_0=114 +k=1 +x_0=500000 +y_0=0 +ellps=GRS80 +units=m +no_defs'
  },
  'cgcs2000-gk-120': {
    label: 'CGCS2000 3-degree GK CM 120E',
    definition: '+proj=tmerc +lat_0=0 +lon_0=120 +k=1 +x_0=500000 +y_0=0 +ellps=GRS80 +units=m +no_defs'
  },
  'cgcs2000-utm-50n': {
    label: 'CGCS2000 UTM Zone 50N',
    definition: '+proj=utm +zone=50 +datum=WGS84 +units=m +no_defs'
  }
};
var map;
var currentSelection = null;
var selectionRectEl = null;
var isSelecting = false;
var selectionStart = null;
var dxfOverlays = [];
var dxfBounds = null;
var buildingsLayer = null;
var currentDxfText = '';
var currentProjectionId = 'cgcs2000-gk-117';

function mapInit(){
  registerProjectionDefs();

  var satelliteLayer = new AMap.TileLayer.Satellite({
    zooms: [2, 20],
    opacity: 1,
    zIndex: 1
  });

  var roadNetLayer = new AMap.TileLayer.RoadNet({
    zooms: [2, 20],
    opacity: 1,
    zIndex: 5
  });

  map = new AMap.Map('container', {
    rotateEnable: true,
    pitchEnable: true,
    zoom: 17,
    pitch: 55,
    rotation: -10,
    viewMode: '3D',
    zooms: [2, 20],
    layers: [satelliteLayer, roadNetLayer],
    center: [117.028, 36.67]
  });

  buildingsLayer = new AMap.Buildings({
    zooms: [15, 20],
    zIndex: 10,
    heightFactor: 1,
    wallColor: BUILDING_STYLE.wallColor,
    roofColor: BUILDING_STYLE.roofColor
  });
  map.addLayer(buildingsLayer);

  var controlBar = new AMap.ControlBar({
    position: {
      right: '10px',
      top: '10px'
    }
  });
  controlBar.addTo(map);

  var toolBar = new AMap.ToolBar({
    position: {
      right: '40px',
      top: '110px'
    }
  });
  toolBar.addTo(map);

  initPipelineTools();
  initExportTools();
  loadDefaultDxf();
}

function registerProjectionDefs(){
  Object.keys(CRS_DEFS).forEach(function(key){
    proj4.defs(key, CRS_DEFS[key].definition);
  });
}

function initPipelineTools(){
  var loadBtn = document.getElementById('loadDxfBtn');
  var pickBtn = document.getElementById('pickDxfBtn');
  var fileInput = document.getElementById('dxfFileInput');
  var crsSelect = document.getElementById('crsSelect');
  var fitBtn = document.getElementById('fitPipelineBtn');

  crsSelect.value = currentProjectionId;

  loadBtn.addEventListener('click', function(){
    if (currentDxfText) {
      renderDxfText(currentDxfText, currentProjectionId);
      return;
    }
    loadDefaultDxf();
  });

  pickBtn.addEventListener('click', function(){
    fileInput.click();
  });

  fileInput.addEventListener('change', function(event){
    var file = event.target.files && event.target.files[0];
    if (!file) return;
    readLocalDxfFile(file);
    fileInput.value = '';
  });

  crsSelect.addEventListener('change', function(event){
    currentProjectionId = event.target.value;
    if (!currentDxfText) return;
    renderDxfText(currentDxfText, currentProjectionId);
  });

  fitBtn.addEventListener('click', fitPipelineView);
}

async function loadDefaultDxf(){
  setStatus('正在加载 ' + DXF_FILE_NAME + ' ...');
  try {
    var response = await fetch(encodeURI(DXF_FILE_NAME));
    if (!response.ok) {
      throw new Error('HTTP ' + response.status);
    }
    currentDxfText = await response.text();
    renderDxfText(currentDxfText, currentProjectionId);
  } catch (error) {
    console.warn(error);
    currentDxfText = '';
    setStats('未加载');
    document.getElementById('fitPipelineBtn').disabled = true;
    setStatus('自动加载失败。若页面是本地直开，请点击“选择本地 DXF”手动导入。');
  }
}

function readLocalDxfFile(file){
  setStatus('正在读取本地 DXF: ' + file.name);
  var reader = new FileReader();
  reader.onload = function(){
    currentDxfText = String(reader.result || '');
    renderDxfText(currentDxfText, currentProjectionId);
  };
  reader.onerror = function(){
    console.warn(reader.error);
    setStatus('读取本地 DXF 失败，请重试');
  };
  reader.readAsText(file, 'gbk');
}

function renderDxfText(dxfText, projectionId){
  if (!dxfText) {
    setStatus('DXF 内容为空');
    return;
  }

  var parsed = parseDxf(dxfText);
  var projection = CRS_DEFS[projectionId];

  if (!projection) {
    setStatus('未找到坐标系定义: ' + projectionId);
    return;
  }

  var mergedFeatures = mergeLinearFeatures(parsed.features, SEGMENT_MERGE_TOLERANCE);
  var projected = projectFeatures(mergedFeatures, parsed.inserts, projectionId);
  if (!projected.features.length) {
    clearDxfOverlays();
    setStats('0 条管线');
    document.getElementById('fitPipelineBtn').disabled = true;
    setStatus('未解析出可绘制的线性实体');
    return;
  }

  drawProjectedFeatures(projected);
  dxfBounds = projected.bounds;
  document.getElementById('fitPipelineBtn').disabled = false;
  fitPipelineView();
  setStats(projected.features.length + ' 条管线 / ' + projected.valves.length + ' 个阀门');
  setStatus('已加载 ' + projected.features.length + ' 条管线、' + projected.valves.length + ' 个阀门，坐标系: ' + projection.label);
}

function parseDxf(dxfText){
  var lines = dxfText.replace(/\u0000/g, '').split(/\r?\n/);
  var pairs = [];
  for (var i = 0; i < lines.length; i += 2) {
    pairs.push({
      code: (lines[i] || '').trim(),
      value: lines[i + 1] == null ? '' : String(lines[i + 1]).trim()
    });
  }

  var features = [];
  var inserts = [];
  var inEntities = false;
  var entity = null;
  var polylineBuffer = null;

  for (var index = 0; index < pairs.length; index++) {
    var pair = pairs[index];

    if (pair.code === '0' && pair.value === 'SECTION' && pairs[index + 1] && pairs[index + 1].code === '2') {
      inEntities = pairs[index + 1].value === 'ENTITIES';
      entity = null;
      polylineBuffer = null;
      continue;
    }

    if (!inEntities) continue;

    if (pair.code === '0' && pair.value === 'ENDSEC') {
      finalizeOpenEntities(features, inserts, entity, polylineBuffer);
      break;
    }

    if (pair.code === '0') {
      if (pair.value === 'VERTEX') {
        if (polylineBuffer) {
          var vertex = consumeVertexEntity(pairs, index + 1);
          if (vertex.point) {
            polylineBuffer.points.push(vertex.point);
          }
          index = vertex.nextIndex - 1;
          continue;
        }
      }

      if (pair.value === 'SEQEND') {
        if (polylineBuffer && polylineBuffer.points.length >= 2) {
          if (polylineBuffer.closed) {
            closePoints(polylineBuffer.points);
          }
          features.push(makeFeature(polylineBuffer.layer, polylineBuffer.points, 'POLYLINE'));
        }
        polylineBuffer = null;
        continue;
      }

      if (entity) {
        pushFeatureFromEntity(features, inserts, entity);
      }

      entity = {
        type: pair.value,
        data: {}
      };

      if (pair.value === 'POLYLINE') {
        polylineBuffer = {
          layer: '',
          points: [],
          closed: false
        };
      }
      continue;
    }

    if (!entity) continue;

    if (polylineBuffer && entity.type === 'POLYLINE') {
      if (pair.code === '8') {
        polylineBuffer.layer = pair.value || '';
      } else if (pair.code === '70') {
        polylineBuffer.closed = (toNumber(pair.value) & 1) === 1;
      }
      continue;
    }

    if (!entity.data[pair.code]) {
      entity.data[pair.code] = [];
    }
    entity.data[pair.code].push(pair.value);
  }

  return {
    features: features,
    inserts: inserts
  };
}

function finalizeOpenEntities(features, inserts, entity, polylineBuffer){
  if (entity) {
    pushFeatureFromEntity(features, inserts, entity);
  }
  if (polylineBuffer && polylineBuffer.points.length >= 2) {
    if (polylineBuffer.closed) {
      closePoints(polylineBuffer.points);
    }
    features.push(makeFeature(polylineBuffer.layer, polylineBuffer.points, 'POLYLINE'));
  }
}

function consumeVertexEntity(pairs, startIndex){
  var point = null;
  var x = null;
  var y = null;
  var cursor = startIndex;

  while (cursor < pairs.length) {
    var pair = pairs[cursor];
    if (pair.code === '0') break;
    if (pair.code === '10') x = toNumber(pair.value);
    if (pair.code === '20') y = toNumber(pair.value);
    cursor += 1;
  }

  if (Number.isFinite(x) && Number.isFinite(y)) {
    point = [x, y];
  }

  return {
    point: point,
    nextIndex: cursor
  };
}

function pushFeatureFromEntity(features, inserts, entity){
  var type = entity.type;
  if (type === 'LINE' || type === 'TRLINE') {
    var linePoints = [
      [firstNumber(entity.data['10']), firstNumber(entity.data['20'])],
      [firstNumber(entity.data['11']), firstNumber(entity.data['21'])]
    ];
    if (isValidPoint(linePoints[0]) && isValidPoint(linePoints[1])) {
      features.push(makeFeature(firstValue(entity.data['8']), linePoints, type));
    }
    return;
  }

  if (type === 'INSERT') {
    var insertPoint = [firstNumber(entity.data['10']), firstNumber(entity.data['20'])];
    if (isValidPoint(insertPoint)) {
      inserts.push({
        layer: firstValue(entity.data['8']) || '0',
        name: firstValue(entity.data['2']) || '',
        rotation: firstNumber(entity.data['50']) || 0,
        point: insertPoint
      });
    }
    return;
  }

  if (type === 'LWPOLYLINE') {
    var xs = entity.data['10'] || [];
    var ys = entity.data['20'] || [];
    var points = [];
    for (var i = 0; i < Math.min(xs.length, ys.length); i += 1) {
      var point = [toNumber(xs[i]), toNumber(ys[i])];
      if (isValidPoint(point)) {
        points.push(point);
      }
    }
    if (points.length >= 2) {
      var flags = firstNumber(entity.data['70']);
      if ((flags & 1) === 1) {
        closePoints(points);
      }
      features.push(makeFeature(firstValue(entity.data['8']), points, type));
    }
  }
}

function makeFeature(layerName, points, type){
  return {
    layer: layerName || '0',
    type: type,
    points: points,
    closed: isClosedPath(points)
  };
}

function isClosedPath(points){
  if (!points || points.length < 3) return false;
  var first = points[0];
  var last = points[points.length - 1];
  return first[0] === last[0] && first[1] === last[1];
}

function closePoints(points){
  var first = points[0];
  var last = points[points.length - 1];
  if (!first || !last) return;
  if (first[0] !== last[0] || first[1] !== last[1]) {
    points.push([first[0], first[1]]);
  }
}

function mergeLinearFeatures(features, tolerance){
  var grouped = {};
  var merged = [];

  features.forEach(function(feature){
    if (feature.closed || feature.points.length < 2) {
      merged.push(feature);
      return;
    }
    var groupKey = feature.layer + '|' + feature.type;
    if (!grouped[groupKey]) grouped[groupKey] = [];
    grouped[groupKey].push(cloneFeature(feature));
  });

  Object.keys(grouped).forEach(function(groupKey){
    var pending = grouped[groupKey].slice();
    while (pending.length) {
      var current = pending.shift();
      var changed = true;
      while (changed) {
        changed = false;
        for (var i = 0; i < pending.length; i += 1) {
          var candidate = pending[i];
          var joined = tryMergeFeaturePair(current, candidate, tolerance);
          if (joined) {
            current = joined;
            pending.splice(i, 1);
            changed = true;
            break;
          }
        }
      }
      merged.push(current);
    }
  });

  return merged;
}

function cloneFeature(feature){
  return {
    layer: feature.layer,
    type: feature.type,
    closed: feature.closed,
    points: feature.points.map(function(point){ return [point[0], point[1]]; })
  };
}

function tryMergeFeaturePair(left, right, tolerance){
  var leftStart = left.points[0];
  var leftEnd = left.points[left.points.length - 1];
  var rightStart = right.points[0];
  var rightEnd = right.points[right.points.length - 1];

  if (pointsNear(leftEnd, rightStart, tolerance)) {
    return mergedFeature(left, right.points.slice(1));
  }
  if (pointsNear(leftEnd, rightEnd, tolerance)) {
    return mergedFeature(left, reversePoints(right.points).slice(1));
  }
  if (pointsNear(leftStart, rightEnd, tolerance)) {
    return mergedFeature(right, left.points.slice(1));
  }
  if (pointsNear(leftStart, rightStart, tolerance)) {
    return mergedFeature({ layer: left.layer, type: left.type, points: reversePoints(right.points), closed: false }, left.points.slice(1));
  }
  return null;
}

function mergedFeature(baseFeature, suffixPoints){
  return {
    layer: baseFeature.layer,
    type: baseFeature.type,
    closed: false,
    points: baseFeature.points.concat(suffixPoints)
  };
}

function reversePoints(points){
  return points.slice().reverse();
}

function pointsNear(a, b, tolerance){
  if (!a || !b) return false;
  var dx = a[0] - b[0];
  var dy = a[1] - b[1];
  return Math.sqrt(dx * dx + dy * dy) <= tolerance;
}

function projectFeatures(features, inserts, projectionId){
  var projectedFeatures = [];
  var projectedValves = [];
  var bounds = null;

  features.forEach(function(feature){
    var path = [];
    feature.points.forEach(function(point){
      var lnglat = projectedPointToGcj(point, projectionId);
      if (!lnglat) return;
      path.push(lnglat);
      bounds = extendBounds(bounds, lnglat);
    });

    if (path.length >= 2) {
      projectedFeatures.push({
        layer: feature.layer,
        type: feature.type,
        path: path
      });
    }
  });

  inserts.forEach(function(insert){
    if (!isValveInsert(insert)) return;
    var lnglat = projectedPointToGcj(insert.point, projectionId);
    if (!lnglat) return;
    projectedValves.push({
      layer: insert.layer,
      name: insert.name,
      rotation: insert.rotation,
      lnglat: lnglat
    });
    bounds = extendBounds(bounds, lnglat);
  });

  return {
    features: projectedFeatures,
    valves: projectedValves,
    bounds: bounds
  };
}

function isValveInsert(insert){
  return VALVE_KEYWORDS.some(function(keyword){
    return insert.name.indexOf(keyword) !== -1;
  });
}

function projectedPointToGcj(point, projectionId){
  try {
    var wgs84 = proj4(projectionId, WGS84, point);
    if (!Array.isArray(wgs84) || wgs84.length < 2) {
      return null;
    }
    if (!isProbablyChinaLngLat(wgs84[0], wgs84[1])) {
      return null;
    }
    return wgs84ToGcj02(wgs84[0], wgs84[1]);
  } catch (error) {
    console.warn('Coordinate transform failed', error);
    return null;
  }
}

function isProbablyChinaLngLat(lng, lat){
  return lng >= 70 && lng <= 140 && lat >= 3 && lat <= 55;
}

function drawProjectedFeatures(projected){
  clearDxfOverlays();

  var overlays = [];
  projected.features.forEach(function(feature){
    overlays.push(new AMap.Polyline({
      path: feature.path,
      strokeColor: PIPELINE_STYLE.baseColor,
      strokeOpacity: PIPELINE_STYLE.baseOpacity,
      strokeWeight: PIPELINE_STYLE.baseWeight,
      strokeStyle: 'solid',
      lineJoin: PIPELINE_STYLE.lineJoin,
      lineCap: PIPELINE_STYLE.lineCap,
      zIndex: PIPELINE_STYLE.zIndexBase
    }));

    overlays.push(new AMap.Polyline({
      path: feature.path,
      strokeColor: PIPELINE_STYLE.strokeColor,
      strokeOpacity: PIPELINE_STYLE.strokeOpacity,
      strokeWeight: PIPELINE_STYLE.strokeWeight,
      strokeStyle: 'solid',
      lineJoin: PIPELINE_STYLE.lineJoin,
      lineCap: PIPELINE_STYLE.lineCap,
      zIndex: PIPELINE_STYLE.zIndexTop
    }));
  });

  projected.valves.forEach(function(valve){
    overlays.push(createValveSymbol(valve));
    overlays.push(createValveLabel(valve));
  });

  dxfOverlays = overlays;
  map.add(overlays);
}

function createValveSymbol(valve){
  var rotation = Number.isFinite(valve.rotation) ? valve.rotation : 0;
  return new AMap.Marker({
    position: valve.lnglat,
    zIndex: VALVE_STYLE.zIndex,
    offset: new AMap.Pixel(-8, -8),
    angle: rotation,
    content:
      '<div style="' +
      'width:14px;height:14px;box-sizing:border-box;' +
      'border:2px solid ' + VALVE_STYLE.borderColor + ';' +
      'background:' + VALVE_STYLE.symbolColor + ';' +
      'transform:rotate(45deg);' +
      'box-shadow:0 0 0 1px rgba(20,16,8,0.28);' +
      '"></div>'
  });
}

function createValveLabel(valve){
  return new AMap.Text({
    text: valve.name,
    position: valve.lnglat,
    zIndex: VALVE_STYLE.zIndex + 1,
    offset: new AMap.Pixel(10, -16),
    style: {
      padding: '1px 4px',
      border: 'none',
      background: 'transparent',
      color: VALVE_STYLE.textColor,
      fontSize: '12px',
      fontWeight: '600',
      textShadow: '0 0 2px ' + VALVE_STYLE.haloColor + ', 0 0 6px ' + VALVE_STYLE.haloColor
    }
  });
}

function clearDxfOverlays(){
  if (!dxfOverlays.length) return;
  map.remove(dxfOverlays);
  dxfOverlays = [];
}

function fitPipelineView(){
  if (!dxfOverlays.length) return;
  map.setFitView(dxfOverlays, false, [90, 70, 70, 70]);
  window.setTimeout(function(){
    if (typeof map.setPitch === 'function') map.setPitch(VIEW_PRESET.pitch);
    if (typeof map.setRotation === 'function') map.setRotation(VIEW_PRESET.rotation);
  }, 180);
}

function extendBounds(bounds, lnglat){
  if (!bounds) {
    return {
      southWest: [lnglat[0], lnglat[1]],
      northEast: [lnglat[0], lnglat[1]]
    };
  }

  bounds.southWest[0] = Math.min(bounds.southWest[0], lnglat[0]);
  bounds.southWest[1] = Math.min(bounds.southWest[1], lnglat[1]);
  bounds.northEast[0] = Math.max(bounds.northEast[0], lnglat[0]);
  bounds.northEast[1] = Math.max(bounds.northEast[1], lnglat[1]);
  return bounds;
}

function setStats(message){
  document.getElementById('pipelineStats').textContent = message;
}

function firstValue(values){
  return Array.isArray(values) && values.length ? values[0] : '';
}

function firstNumber(values){
  return toNumber(firstValue(values));
}

function toNumber(value){
  if (value == null || value === '') return NaN;
  return Number(value);
}

function isValidPoint(point){
  return Array.isArray(point) && Number.isFinite(point[0]) && Number.isFinite(point[1]);
}

function initExportTools(){
  var overlay = document.getElementById('selectionOverlay');
  var selectBtn = document.getElementById('selectAreaBtn');
  var exportBtn = document.getElementById('exportAreaBtn');
  var clearBtn = document.getElementById('clearAreaBtn');

  selectBtn.addEventListener('click', startAreaSelection);
  exportBtn.addEventListener('click', exportSelectedArea);
  clearBtn.addEventListener('click', clearSelection);

  overlay.addEventListener('mousedown', function(event){
    if (!isSelecting || event.button !== 0) return;
    event.preventDefault();
    selectionStart = getClampedContainerPoint(event);
    createSelectionRect();
    updateSelectionRect(makeRect(selectionStart, selectionStart));
  });

  window.addEventListener('mousemove', function(event){
    if (!isSelecting || !selectionStart || !selectionRectEl) return;
    event.preventDefault();
    updateSelectionRect(makeRect(selectionStart, getClampedContainerPoint(event)));
  });

  window.addEventListener('mouseup', function(event){
    if (!isSelecting || !selectionStart || !selectionRectEl) return;
    event.preventDefault();
    var endPoint = getClampedContainerPoint(event);
    var rect = makeRect(selectionStart, endPoint);
    selectionStart = null;

    if (rect.width < 20 || rect.height < 20) {
      clearSelection();
      setStatus('框选区域太小，请重新框选');
      return;
    }

    currentSelection = rect;
    updateSelectionRect(rect);
    setSelectionMode(false);
    exportBtn.disabled = false;
    clearBtn.disabled = false;
    setStatus('已框选 ' + Math.round(rect.width) + ' x ' + Math.round(rect.height) + ' 像素');
  });
}

function startAreaSelection(){
  clearSelection();
  setSelectionMode(true);
  setStatus('拖拽框选地图区域');
}

function setSelectionMode(enabled){
  isSelecting = enabled;
  document.getElementById('selectionOverlay').classList.toggle('active', enabled);
  setMapInteractions(!enabled);
}

function setMapInteractions(enabled){
  if (!map || typeof map.setStatus !== 'function') return;
  map.setStatus({
    dragEnable: enabled,
    zoomEnable: enabled,
    rotateEnable: enabled,
    pitchEnable: enabled,
    keyboardEnable: enabled,
    doubleClickZoom: enabled,
    scrollWheel: enabled
  });
}

function createSelectionRect(){
  var overlay = document.getElementById('selectionOverlay');
  if (selectionRectEl) selectionRectEl.remove();
  selectionRectEl = document.createElement('div');
  selectionRectEl.className = 'selection-rect';
  overlay.appendChild(selectionRectEl);
}

function updateSelectionRect(rect){
  if (!selectionRectEl) return;
  selectionRectEl.style.left = rect.left + 'px';
  selectionRectEl.style.top = rect.top + 'px';
  selectionRectEl.style.width = rect.width + 'px';
  selectionRectEl.style.height = rect.height + 'px';
}

function clearSelection(){
  currentSelection = null;
  selectionStart = null;
  setSelectionMode(false);
  if (selectionRectEl) {
    selectionRectEl.remove();
    selectionRectEl = null;
  }
  document.getElementById('exportAreaBtn').disabled = true;
  document.getElementById('clearAreaBtn').disabled = true;
}

function getClampedContainerPoint(event){
  var containerRect = document.getElementById('container').getBoundingClientRect();
  return {
    x: clamp(event.clientX, containerRect.left, containerRect.right),
    y: clamp(event.clientY, containerRect.top, containerRect.bottom)
  };
}

function makeRect(start, end){
  var left = Math.min(start.x, end.x);
  var top = Math.min(start.y, end.y);
  var right = Math.max(start.x, end.x);
  var bottom = Math.max(start.y, end.y);
  return {
    left: left,
    top: top,
    right: right,
    bottom: bottom,
    width: right - left,
    height: bottom - top
  };
}

function clamp(value, min, max){
  return Math.min(Math.max(value, min), max);
}

function buildSelectionMetadata(rect){
  var containerRect = document.getElementById('container').getBoundingClientRect();
  var containerPixels = {
    left: rect.left - containerRect.left,
    top: rect.top - containerRect.top,
    right: rect.right - containerRect.left,
    bottom: rect.bottom - containerRect.top,
    width: rect.width,
    height: rect.height
  };
  var cornerPixels = {
    topLeft: [containerPixels.left, containerPixels.top],
    topRight: [containerPixels.right, containerPixels.top],
    bottomRight: [containerPixels.right, containerPixels.bottom],
    bottomLeft: [containerPixels.left, containerPixels.bottom]
  };
  var corners = {
    topLeft: pixelToLngLat(cornerPixels.topLeft),
    topRight: pixelToLngLat(cornerPixels.topRight),
    bottomRight: pixelToLngLat(cornerPixels.bottomRight),
    bottomLeft: pixelToLngLat(cornerPixels.bottomLeft)
  };
  var centerPixel = [
    containerPixels.left + containerPixels.width / 2,
    containerPixels.top + containerPixels.height / 2
  ];
  var cornerValues = Object.keys(corners).map(function(key){ return corners[key]; });
  var lngs = cornerValues.map(function(item){ return item[0]; });
  var lats = cornerValues.map(function(item){ return item[1]; });

  return {
    version: 1,
    exportedAt: new Date().toISOString(),
    coordSystem: 'GCJ-02',
    imageMode: 'current-view',
    mapView: getMapView(),
    selection: {
      viewportPixels: roundRect(rect),
      containerPixels: roundRect(containerPixels)
    },
    corners: corners,
    center: pixelToLngLat(centerPixel),
    boundsApprox: {
      southWest: [roundCoord(Math.min.apply(null, lngs)), roundCoord(Math.min.apply(null, lats))],
      northEast: [roundCoord(Math.max.apply(null, lngs)), roundCoord(Math.max.apply(null, lats))]
    }
  };
}

function pixelToLngLat(pixelPair){
  var lnglat = map.containerToLngLat(new AMap.Pixel(pixelPair[0], pixelPair[1]));
  return [roundCoord(lnglat.lng), roundCoord(lnglat.lat)];
}

function getMapView(){
  var center = map.getCenter();
  return {
    center: [roundCoord(center.lng), roundCoord(center.lat)],
    zoom: typeof map.getZoom === 'function' ? map.getZoom() : null,
    pitch: typeof map.getPitch === 'function' ? map.getPitch() : null,
    rotation: typeof map.getRotation === 'function' ? map.getRotation() : null
  };
}

function roundRect(rect){
  return {
    left: Math.round(rect.left),
    top: Math.round(rect.top),
    right: Math.round(rect.right),
    bottom: Math.round(rect.bottom),
    width: Math.round(rect.width),
    height: Math.round(rect.height)
  };
}

function roundCoord(value){
  return Number(Number(value).toFixed(8));
}

function setStatus(message){
  document.getElementById('statusBar').textContent = message;
}

async function exportSelectedArea(){
  if (!currentSelection) {
    setStatus('请先框选区域');
    return;
  }

  var metadata = buildSelectionMetadata(currentSelection);
  var fileStamp = new Date().toISOString().replace(/[:.]/g, '-');
  downloadJson(metadata, 'map-selection-' + fileStamp + '.json');
  setStatus('坐标已导出，准备截图');

  try {
    var imageBlob = await captureSelectionImage(currentSelection);
    downloadBlob(imageBlob, 'map-selection-' + fileStamp + '.png');
    setStatus('已导出图片和坐标');
  } catch (error) {
    console.warn(error);
    setStatus('截图未完成，仅导出坐标；如需图片，请授权捕获当前标签页或窗口');
  }
}

async function captureSelectionImage(rect){
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
    throw new Error('Screen Capture API is not available');
  }

  var stream = null;
  setExportUiHidden(true);

  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: {
        displaySurface: 'browser'
      },
      audio: false
    });

    var video = document.createElement('video');
    video.srcObject = stream;
    video.muted = true;
    await video.play();
    await waitForVideoFrame(video);
    await delay(250);

    var scaleX = video.videoWidth / window.innerWidth;
    var scaleY = video.videoHeight / window.innerHeight;
    var canvas = document.createElement('canvas');
    canvas.width = Math.max(1, Math.round(rect.width * scaleX));
    canvas.height = Math.max(1, Math.round(rect.height * scaleY));
    var ctx = canvas.getContext('2d');
    ctx.drawImage(
      video,
      Math.round(rect.left * scaleX),
      Math.round(rect.top * scaleY),
      Math.round(rect.width * scaleX),
      Math.round(rect.height * scaleY),
      0,
      0,
      canvas.width,
      canvas.height
    );

    return await canvasToBlob(canvas);
  } finally {
    setExportUiHidden(false);
    if (stream) {
      stream.getTracks().forEach(function(track){ track.stop(); });
    }
  }
}

function waitForVideoFrame(video){
  return new Promise(function(resolve){
    if (video.readyState >= 2 && video.videoWidth && video.videoHeight) {
      resolve();
      return;
    }
    video.onloadedmetadata = function(){ resolve(); };
  });
}

function canvasToBlob(canvas){
  return new Promise(function(resolve, reject){
    canvas.toBlob(function(blob){
      if (blob) {
        resolve(blob);
      } else {
        reject(new Error('Failed to export canvas blob'));
      }
    }, 'image/png');
  });
}

function delay(ms){
  return new Promise(function(resolve){ setTimeout(resolve, ms); });
}

function setExportUiHidden(hidden){
  document.querySelector('.panel').classList.toggle('capture-hidden', hidden);
  document.getElementById('selectionOverlay').classList.toggle('capture-hidden', hidden);
  document.getElementById('statusBar').classList.toggle('capture-hidden', hidden);
}

function downloadJson(data, filename){
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json;charset=utf-8'});
  downloadBlob(blob, filename);
}

function downloadBlob(blob, filename){
  var url = URL.createObjectURL(blob);
  var link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

function transformLat(x, y){
  var ret = -100 + 2 * x + 3 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
  ret += (20 * Math.sin(6 * x * Math.PI) + 20 * Math.sin(2 * x * Math.PI)) * 2 / 3;
  ret += (20 * Math.sin(y * Math.PI) + 40 * Math.sin(y / 3 * Math.PI)) * 2 / 3;
  ret += (160 * Math.sin(y / 12 * Math.PI) + 320 * Math.sin(y * Math.PI / 30)) * 2 / 3;
  return ret;
}

function transformLng(x, y){
  var ret = 300 + x + 2 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
  ret += (20 * Math.sin(6 * x * Math.PI) + 20 * Math.sin(2 * x * Math.PI)) * 2 / 3;
  ret += (20 * Math.sin(x * Math.PI) + 40 * Math.sin(x / 3 * Math.PI)) * 2 / 3;
  ret += (150 * Math.sin(x / 12 * Math.PI) + 300 * Math.sin(x / 30 * Math.PI)) * 2 / 3;
  return ret;
}

function outOfChina(lng, lat){
  return lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271;
}

function wgs84ToGcj02(lng, lat){
  if (outOfChina(lng, lat)) return [lng, lat];
  var a = 6378245.0;
  var ee = 0.00669342162296594323;
  var dLat = transformLat(lng - 105.0, lat - 35.0);
  var dLng = transformLng(lng - 105.0, lat - 35.0);
  var radLat = lat / 180.0 * Math.PI;
  var magic = Math.sin(radLat);
  magic = 1 - ee * magic * magic;
  var sqrtMagic = Math.sqrt(magic);
  dLat = (dLat * 180.0) / ((a * (1 - ee)) / (magic * sqrtMagic) * Math.PI);
  dLng = (dLng * 180.0) / (a / sqrtMagic * Math.cos(radLat) * Math.PI);
  return [lng + dLng, lat + dLat];
}
