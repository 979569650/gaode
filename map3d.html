<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width initial-scale=1.0 maximum-scale=1.0 user-scalable=0">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<link rel="icon" href="data:,">
<title>3D地图</title>
<script>
var IS_POSTER_MODE = new URLSearchParams(window.location.search).get('poster') === '1';
if (IS_POSTER_MODE) {
  document.documentElement.classList.add('poster-mode');
}
</script>
</head>
<body>
<div id="container" style="width:100%; height:100%;resize:both;"></div>
<div id="mapConsole" class="map-console">
  <div class="console-head">
    <div>
      <div class="console-title">地图控制台</div>
    </div>
    <button id="toggleConsoleBtn" class="console-toggle" type="button" title="收起面板" aria-label="收起面板">‹</button>
  </div>
  <div id="statusSummary" class="visually-hidden" aria-hidden="true">待加载</div>
  <div class="console-actions">
    <button id="loadDxfBtn" type="button">重载</button>
    <button id="fitPipelineBtn" type="button" disabled>定位</button>
    <button id="saveStyleConfigBtn" type="button">保存</button>
    <button id="exportPosterBtn" class="primary-action" type="button">导出高清图</button>
  </div>
  <div class="console-tabs">
    <button class="tab-button active" type="button" data-tab="data">数据</button>
    <button class="tab-button" type="button" data-tab="area">范围</button>
    <button class="tab-button" type="button" data-tab="style">样式</button>
    <button class="tab-button" type="button" data-tab="layers">层级</button>
    <button class="tab-button" type="button" data-tab="export">导出</button>
    <button class="tab-button" type="button" data-tab="advanced">高级</button>
  </div>
  <div class="console-body">
    <section class="tab-panel active" data-panel="data">
      <div class="control-grid single">
        <button id="pickDxfBtn" type="button">选择本地 DXF</button>
      </div>
  <input id="dxfFileInput" type="file" accept=".dxf" style="display:none;">
      <div class="section-title">坐标系</div>
      <div class="control-grid single">
        <label class="control-field">坐标系
  <select id="crsSelect">
    <option value="cgcs2000-gk-117">CGCS2000 3° GK 117E</option>
    <option value="cgcs2000-gk-114">CGCS2000 3° GK 114E</option>
    <option value="cgcs2000-gk-120">CGCS2000 3° GK 120E</option>
    <option value="cgcs2000-utm-50n">CGCS2000 UTM 50N</option>
  </select>
        </label>
      </div>
    </section>
    <section class="tab-panel" data-panel="area">
      <div class="control-grid">
  <button id="drawBuildingAreaBtn" type="button">绘制楼块范围</button>
  <button id="saveBuildingAreaBtn" type="button" disabled>保存范围</button>
  <button id="clearBuildingAreaBtn" type="button">清除范围</button>
      </div>
      <div class="section-title">范围样式</div>
      <div class="control-grid">
        <label class="control-field">范围填充<span class="color-row"><input id="areaFillColorInput" type="color"><input id="areaFillAlphaInput" type="range" min="0" max="1" step="0.01"></span></label>
        <label class="control-field">范围外底色<span class="color-row"><input id="areaOutsideFillColorInput" type="color"><input id="areaOutsideFillAlphaInput" type="range" min="0" max="1" step="0.01"></span></label>
        <label class="control-field">框线颜色<span class="color-row"><input id="areaStrokeColorInput" type="color"><input id="areaStrokeAlphaInput" type="range" min="0" max="1" step="0.01"></span></label>
        <label class="control-field">框线粗细<input id="areaStrokeWeightInput" type="range" min="0" max="20" step="0.5"></label>
      </div>
    </section>
    <section class="tab-panel" data-panel="style">
      <div class="control-grid">
        <label class="control-field">楼顶颜色<span class="color-row"><input id="buildingRoofColorInput" type="color"><input id="buildingRoofAlphaInput" type="range" min="0" max="1" step="0.01"></span></label>
        <label class="control-field">楼体颜色<span class="color-row"><input id="buildingWallColorInput" type="color"><input id="buildingWallAlphaInput" type="range" min="0" max="1" step="0.01"></span></label>
      </div>
    </section>
    <section class="tab-panel" data-panel="layers">
      <div class="control-grid">
        <label class="control-field">卫星层级<input id="satelliteLayerZInput" type="number" min="0" max="10000" step="1"></label>
        <label class="control-field">道路层级<input id="roadLayerZInput" type="number" min="0" max="10000" step="1"></label>
        <label class="control-field">范围外层级<input id="outsideMaskLayerZInput" type="number" min="0" max="10000" step="1"></label>
        <label class="control-field">范围面层级<input id="areaLayerZInput" type="number" min="0" max="10000" step="1"></label>
        <label class="control-field">模型层级<input id="modelLayerZInput" type="number" min="0" max="10000" step="1"></label>
        <label class="control-field">管线层级<input id="pipelineLayerZInput" type="number" min="0" max="10000" step="1"></label>
        <label class="control-field">文字层级<input id="labelLayerZInput" type="number" min="0" max="10000" step="1"></label>
      </div>
    </section>
    <section class="tab-panel" data-panel="export">
      <div class="control-grid">
        <label class="control-field">比例<select id="exportAspectRatioInput"><option value="16:9">16:9</option><option value="4:3">4:3</option></select></label>
        <label class="control-field">宽度<input id="exportWidthInput" type="number" min="320" max="12000" step="1"></label>
        <label class="control-field">高度(自动)<input id="exportHeightInput" type="number" min="240" max="10000" step="1" readonly></label>
        <label class="control-field">倍率<input id="exportScaleInput" type="number" min="1" max="8" step="0.5"></label>
        <label class="control-field">稳定等待(ms)<input id="exportSettleInput" type="number" min="0" max="180000" step="1000"></label>
        <label class="control-field">最大等待(ms)<input id="exportWaitInput" type="number" min="5000" max="240000" step="1000"></label>
        <label class="control-field">加速模式<select id="exportAccelerationInput"><option value="auto">自动</option><option value="gpu">GPU</option><option value="software">软件</option></select></label>
      </div>
      <div class="preset-row">
        <button type="button" data-export-preset="preview">快速预览</button>
        <button type="button" data-export-preset="hd">高清</button>
        <button type="button" data-export-preset="ultra">超高清</button>
        <button type="button" data-export-preset="max">12000</button>
      </div>
      <div id="exportPixelNotice" class="field-hint">待计算</div>
    </section>
    <section class="tab-panel" data-panel="advanced">
      <div class="section-title">管线</div>
      <div class="control-grid">
        <label class="control-field">管线颜色<span class="color-row"><input id="pipelineColorInput" type="color"><input id="pipelineAlphaInput" type="range" min="0" max="1" step="0.01"></span></label>
        <label class="control-field">竖管颜色<span class="color-row"><input id="pipelineVerticalColorInput" type="color"><input id="pipelineVerticalAlphaInput" type="range" min="0" max="1" step="0.01"></span></label>
        <label class="control-field">地下颜色<span class="color-row"><input id="pipelineUndergroundColorInput" type="color"><input id="pipelineUndergroundAlphaInput" type="range" min="0" max="1" step="0.01"></span></label>
        <label class="control-field">管线粗细<input id="pipelineRadiusInput" type="number" min="0.05" max="5" step="0.01"></label>
        <label class="control-field">竖管粗细<input id="pipelineVerticalRadiusInput" type="number" min="0.05" max="5" step="0.01"></label>
        <label class="control-field">地面半径<input id="pipelineGroundRadiusInput" type="number" min="0" max="5" step="0.05"></label>
        <label class="control-field">整体下移<input id="pipelineGroundOffsetInput" type="number" min="-20" max="20" step="0.05"></label>
      </div>
      <div class="section-title">阀门</div>
      <div class="control-grid">
        <label class="control-field">图标宽<input id="valveWidthInput" type="number" min="12" max="80" step="1"></label>
        <label class="control-field">图标高<input id="valveHeightInput" type="number" min="16" max="100" step="1"></label>
        <label class="control-field">聚合距离<input id="valveDedupeInput" type="number" min="0" max="120" step="1"></label>
        <label class="control-field">显示文字<select id="valveShowLabelInput"><option value="false">否</option><option value="true">是</option></select></label>
        <label class="control-field">阀门主色<span class="color-row"><input id="valveSymbolColorInput" type="color"><input id="valveSymbolAlphaInput" type="range" min="0" max="1" step="0.01"></span></label>
        <label class="control-field">阀门边框<span class="color-row"><input id="valveBorderColorInput" type="color"><input id="valveBorderAlphaInput" type="range" min="0" max="1" step="0.01"></span></label>
        <label class="control-field">阀门强调<span class="color-row"><input id="valveAccentColorInput" type="color"><input id="valveAccentAlphaInput" type="range" min="0" max="1" step="0.01"></span></label>
      </div>
    </section>
  </div>
</div>
<div class="poster-caption" aria-hidden="true">
  <div class="poster-title">宽厚里燃气管线总览</div>
  <div class="poster-legend">
    <span class="legend-item"><span class="legend-line"></span><span>燃气管线</span></span>
    <span class="legend-item">
      <svg class="legend-valve" viewBox="0 0 38 52" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M19 50 L14.5 38 H23.5 Z" fill="#382112" opacity="0.82"/>
        <path d="M19 42 V30" stroke="rgba(56,33,18,0.72)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="19" cy="20" r="16" fill="#ea7a1b" stroke="#382112" stroke-width="2"/>
        <circle cx="19" cy="20" r="12" fill="rgba(255,246,226,0.18)" stroke="rgba(255,255,255,0.72)" stroke-width="1"/>
        <path d="M9.5 13.5 L18.4 20 L9.5 26.5 Z" fill="#fff7e4" stroke="#382112" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M28.5 13.5 L19.6 20 L28.5 26.5 Z" fill="#fff7e4" stroke="#382112" stroke-width="1.4" stroke-linejoin="round"/>
        <circle cx="19" cy="20" r="2.6" fill="#ffcf7a" stroke="#382112" stroke-width="1.2"/>
        <path d="M19 11.2 V28.8" stroke="#382112" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span>阀门</span>
    </span>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
