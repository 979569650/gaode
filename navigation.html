<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<link rel="icon" href="data:,">
<title>设施导航</title>
<script>
window.IS_NAVIGATION_MODE = true;
</script>
</head>
<body class="navigation-page">
<div id="container"></div>
<header id="navigationTopbar" class="navigation-topbar" aria-label="实时导航提示">
  <div id="navigationTopInstruction" class="navigation-topbar-status" aria-live="polite"></div>
  <div id="statusSummary" class="visually-hidden" aria-hidden="true">待加载</div>
</header>
<div id="navigationConsole" class="map-console navigation-console">
  <div class="navigation-sheet-grip" aria-hidden="true"></div>
  <div class="console-head">
    <div>
      <div class="console-title">导航设置</div>
    </div>
    <button id="toggleNavigationConsoleBtn" class="console-toggle" type="button" title="收起面板" aria-label="收起面板">收起</button>
  </div>
  <div class="console-body">
    <section class="navigation-panel">
      <div class="navigation-route-card">
        <div class="navigation-endpoint-row">
          <span class="navigation-endpoint-dot origin" aria-hidden="true"></span>
          <div class="navigation-endpoint-content">
            <div class="navigation-endpoint-label">起点</div>
            <div id="navigationOriginInfo" class="navigation-card muted">尚未设置起点。</div>
          </div>
          <div class="navigation-endpoint-actions">
            <button id="locateNavigationOriginBtn" type="button">当前位置</button>
            <button id="pickNavigationOriginBtn" type="button">点选</button>
          </div>
        </div>
        <div class="navigation-route-spine" aria-hidden="true"></div>
        <div class="navigation-endpoint-row">
          <span class="navigation-endpoint-dot target" aria-hidden="true"></span>
          <div class="navigation-endpoint-content">
            <div class="navigation-endpoint-label">终点</div>
            <div id="navigationTargetInfo" class="navigation-card muted">点击地图上的阀门或调压柜选择终点。</div>
          </div>
        </div>
      </div>

      <div class="navigation-primary-row">
        <button id="planNavigationRouteBtn" class="primary-action" type="button" disabled>规划路线</button>
        <a id="openAmapNavigationLink" class="navigation-link disabled" href="#" target="_blank" rel="noopener">高德导航</a>
        <button id="clearNavigationRouteBtn" type="button">清除</button>
      </div>

      <div id="navigationStatus" class="field-hint navigation-status-line">请选择终点并设置起点。</div>
      <div id="navigationSummary" class="navigation-card navigation-summary muted">暂无路线。</div>

      <div class="navigation-live-card">
        <div class="navigation-live-head">
          <span>实时导航</span>
          <label class="navigation-option"><input id="navigationVoiceInput" type="checkbox" checked><span>播报</span></label>
        </div>
        <div id="navigationLiveInfo" class="navigation-card muted">路线生成后可开始实时跟踪。</div>
        <div class="navigation-live-actions">
          <button id="startNavigationTrackingBtn" class="primary-action" type="button" disabled>开始跟踪</button>
          <button id="stopNavigationTrackingBtn" type="button" disabled>停止</button>
          <button id="testNavigationVoiceBtn" type="button">试播语音</button>
        </div>
        <div id="navigationRealtimeStatus" class="field-hint">等待路线。</div>
      </div>

      <details class="navigation-tools">
        <summary>工具</summary>
        <div class="navigation-tool-row">
          <button id="loadDxfBtn" type="button">重载数据</button>
          <button id="fitPipelineBtn" type="button" disabled>定位管线</button>
          <a class="console-action-link" href="/map3d.html">出图页</a>
        </div>
      </details>

      <div id="navigationSteps" class="navigation-steps"></div>
    </section>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
